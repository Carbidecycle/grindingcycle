<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Services - Carbide Cycle</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Welcome to Carbide Cycle</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section>
        <h2>Services</h2>
        <p><strong>Machining Time Calculator</strong></p>
        <p>Calculate machining time for different grinding operations.</p>
        <button onclick="showCalculator()">Start Machining Time Calculator</button>
        <div id="calculatorForm" style="display:none;">
            <label for="operation">Type of Grinding Operation:</label>
            <select id="operation">
                <option value="cylindrical">Cylindrical Grinding</option>
                <option value="surface">Surface Grinding</option>
            </select>

            <div id="cylindricalOptions" style="display:none;">
                <label for="grindingType">Grinding Type:</label>
                <select id="grindingType">
                    <option value="outer">Outer Diameter</option>
                    <option value="inner">Inner Diameter</option>
                    <option value="tapering">Tapering</option>
                </select>
            </div>

            <div id="surfaceOptions" style="display:none;">
                <label for="stock">Stock:</label>
                <input type="number" id="stock">
                <label for="speed">Speed:</label>
                <input type="number" id="speed">
                <label for="feedrate">Feed Rate:</label>
                <input type="number" id="feedrate">
                <label for="depthOfCut">Depth of Cut:</label>
                <input type="number" id="depthOfCut">
                <label for="depthPerPass">Depth Per Pass:</label>
                <input type="number" id="depthPerPass">
                <button onclick="calculateSurface()">Calculate</button>
            </div>

            <div id="cylindricalFields" style="display:none;">
                <label for="diameter">Diameter:</label>
                <input type="number" id="diameter">
                <label for="length">Length:</label>
                <input type="number" id="length">
                <label for="taperingMajor">Major Diameter (for Tapering):</label>
                <input type="number" id="taperingMajor">
                <label for="taperingMinor">Minor Diameter (for Tapering):</label>
                <input type="number" id="taperingMinor">
                <button onclick="calculateCylindrical()">Calculate</button>
            </div>

            <div id="result"></div>
        </div>
    </section>

    <footer>
        <p>&copy; 2024 CarbideCycle.com</p>
    </footer>

    <script src="calculator.js"></script>
</body>
</html>
